<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ziko Portfolio | Admin Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#050508',
                        card: '#12131e',
                        gold: '#d4af37',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-gray-200 min-h-screen font-sans antialiased">
    
    <!-- Top Nav -->
    <nav class="bg-card border-b border-gray-800 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold font-serif text-white tracking-wider">Zakaria Yahia</h1>
                <span class="text-xs text-gold uppercase tracking-widest">Admin Dashboard</span>
            </div>
            <button id="publishBtn" class="bg-gold hover:bg-yellow-500 text-black px-6 py-2 rounded-md font-bold text-sm uppercase tracking-wider transition shadow-[0_0_15px_rgba(212,175,55,0.4)] flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Publish to Live
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <!-- Header & Add Button -->
        <div class="flex justify-between items-end mb-8 border-b border-gray-800 pb-4">
            <div>
                <h2 class="text-3xl font-bold text-white">Portfolio Photos</h2>
                <p class="text-gray-400 mt-1 text-sm">Manage your gallery images, titles, and categories.</p>
            </div>
            <button id="openModalBtn" class="bg-gray-800 hover:bg-gray-700 text-white border border-gray-600 px-5 py-2.5 rounded-md font-medium text-sm flex items-center gap-2 transition">
                <i class="fa-solid fa-plus"></i> Add New Photo
            </button>
        </div>

        <!-- Filters (Optional, just visual for admin) -->
        <div class="flex gap-4 mb-6 overflow-x-auto pb-2" id="adminFilters">
            <button class="filter-btn active px-4 py-1.5 rounded-full bg-white text-black text-sm font-medium" data-filter="all">All Photos</button>
            <button class="filter-btn px-4 py-1.5 rounded-full border border-gray-700 hover:border-gray-500 text-gray-300 text-sm" data-filter="portrait">Portrait</button>
            <button class="filter-btn px-4 py-1.5 rounded-full border border-gray-700 hover:border-gray-500 text-gray-300 text-sm" data-filter="street">Street</button>
            <button class="filter-btn px-4 py-1.5 rounded-full border border-gray-700 hover:border-gray-500 text-gray-300 text-sm" data-filter="architecture">Architecture</button>
            <button class="filter-btn px-4 py-1.5 rounded-full border border-gray-700 hover:border-gray-500 text-gray-300 text-sm" data-filter="events">Events</button>
            <button class="filter-btn px-4 py-1.5 rounded-full border border-gray-700 hover:border-gray-500 text-gray-300 text-sm" data-filter="travel">Travel</button>
            <button class="filter-btn px-4 py-1.5 rounded-full border border-gray-700 hover:border-gray-500 text-gray-300 text-sm" data-filter="culture">Culture</button>
        </div>

        <!-- Photo Grid -->
        <div id="photoGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Photos injected by JS -->
            <div class="col-span-full text-center py-20 text-gray-500" id="loadingState">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-gold"></i>
                <p>Loading photos...</p>
            </div>
        </div>

    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-card border border-gray-700 rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
            
            <div class="flex justify-between items-center p-5 border-b border-gray-800">
                <h3 class="text-xl font-bold text-white">Upload New Photo</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="p-6 overflow-y-auto">
                <form id="uploadForm" class="flex flex-col gap-5">
                    
                    <!-- File Upload Area -->
                    <div class="w-full">
                        <label class="block text-sm font-medium text-gray-400 mb-2">Select Image <span class="text-red-500">*</span></label>
                        <div class="border-2 border-dashed border-gray-700 rounded-lg p-6 flex flex-col items-center justify-center text-center hover:border-gold hover:bg-white/5 transition cursor-pointer relative" id="dropZone">
                            <i class="fa-regular fa-image text-4xl text-gray-500 mb-3" id="previewIcon"></i>
                            <img id="imagePreview" class="hidden max-h-48 rounded-md mb-3 object-contain" />
                            <p class="text-sm text-gray-400" id="fileLabel">Click to browse or drag and drop</p>
                            <input type="file" id="photoFile" name="photo" accept="image/jpeg, image/png, image/webp" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Title <span class="text-red-500">*</span></label>
                            <input type="text" name="title" required class="w-full bg-dark border border-gray-700 rounded p-2.5 text-white focus:border-gold focus:outline-none" placeholder="e.g. Cairo Nights">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Category <span class="text-red-500">*</span></label>
                            <select name="category" required class="w-full bg-dark border border-gray-700 rounded p-2.5 text-white focus:border-gold focus:outline-none">
                                <option value="portrait">Portrait</option>
                                <option value="street">Street</option>
                                <option value="architecture">Architecture</option>
                                <option value="events">Events</option>
                                <option value="travel">Travel</option>
                                <option value="culture">Culture</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Location</label>
                        <input type="text" name="location" class="w-full bg-dark border border-gray-700 rounded p-2.5 text-white focus:border-gold focus:outline-none" placeholder="e.g. Old Cairo, Egypt">
                    </div>

                    <div class="border-t border-gray-800 pt-4 mt-2">
                        <h4 class="text-sm font-bold text-gray-300 mb-3 uppercase tracking-wider">Camera Details (Optional)</h4>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Gear/Camera</label>
                                <input type="text" name="gear" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm text-white" placeholder="Canon EOS">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Focal Length</label>
                                <input type="text" name="focal" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm text-white" placeholder="50mm">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Aperture</label>
                                <input type="text" name="aperture" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm text-white" placeholder="f/1.8">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Shutter / ISO</label>
                                <input type="text" name="shutter" class="w-full bg-dark border border-gray-700 rounded p-2 text-sm text-white" placeholder="1/200s - ISO 100">
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="p-5 border-t border-gray-800 flex justify-end gap-3 bg-dark/50">
                <button id="cancelBtn" class="px-5 py-2 rounded text-sm text-gray-300 hover:bg-gray-800 transition">Cancel</button>
                <button id="submitUploadBtn" type="submit" form="uploadForm" class="px-6 py-2 rounded text-sm font-bold text-black bg-gold hover:bg-yellow-500 transition flex items-center gap-2">
                    <i class="fa-solid fa-upload"></i> Upload & Save
                </button>
            </div>

        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 border border-gray-700 text-white px-5 py-3 rounded shadow-xl flex items-center gap-3 z-[200]">
        <i id="toastIcon" class="fa-solid fa-check-circle text-green-500 text-xl"></i>
        <span id="toastMsg" class="font-medium text-sm">Action successful!</span>
    </div>

    <!-- Admin JS logic -->
    <script src="admin.js"></script>
</body>
</html>
